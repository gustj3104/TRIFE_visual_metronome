<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TRIFE Visual Metronome</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // GitHub Pages has no server-side rewrites, so a direct load of a
      // client-routed path (e.g. /trife/visual-metronome) hits this 404
      // page. It re-encodes the path into a query string and redirects to
      // index.html, which decodes it back before React mounts.
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
